<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinjamanCare</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<div class="hero">
   <img src="img/heroo.jpg">
</div>

<!-- STATS -->
<div class="stats">
    <img src="img/statss-full.png">
</div>

<!-- PROSES -->
<div class="proses">
    <img src="img/prosess-full.png">
</div>

<!-- FORM -->
<div class="form-box">
    <h3>Form Pengajuan</h3>

    <!-- DROPDOWN KEREN -->
    <div class="custom-select">
        <div class="select-box" onclick="toggleSelect()">
            <span id="selectedText">Pilih Aplikasi</span>
            <div class="arrow">⌄</div>
        </div>

        <div class="options">
            <div class="option" onclick="selectOption(this)">
                <img src="img/shopee.png"> Shopee
            </div>
            <div class="option" onclick="selectOption(this)">
                <img src="img/kredivo.png"> Kredivo
            </div>
            <div class="option" onclick="selectOption(this)">
                <img src="img/akulaku.png"> Akulaku
            </div>
        </div>
    </div>

    <div class="input-box">
        <img src="img/icon-user.png">
        <input id="nama" placeholder="Nama Lengkap">
    </div>

    <div class="input-box">
        <img src="img/icon-wa.png">
        <input id="hp" placeholder="Nomor WhatsApp">
    </div>

    <div class="input-box">
        <img src="img/icon-rp.png">
        <input id="jumlah" placeholder="Total Pinjaman">
    </div>

    <div class="input-box">
        <img src="img/icon-calendar.png">
        <input id="tenor" placeholder="Jangka Waktu">
    </div>

    <button class="submit" onclick="kirimWA()">Ajukan Sekarang</button>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinjamanCare</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="img/hero.jpg">
</div>

<!-- JUDUL -->
<div class="judul">
    <h2>Kembalikan Pinjaman Berbagai Aplikasi</h2>
    <p>Layanan pengembalian & pembatalan saldo pinjaman online secara cepat, aman, dan terpercaya.</p>
</div>

<!-- STATS (1 GAMBAR FULL) -->
<div class="full-img">
    <img src="img/stats-full.png">
</div>

<!-- PROSES (1 GAMBAR FULL) -->
<div class="full-img">
    <img src="img/proses-full.png">
</div>

<!-- FORM -->
<div class="form-box" id="form">
    <h3>Form Pengajuan</h3>

    <div class="input-box">
        <img src="img/icon-app.png">
        <select id="app">
            <option>Pilih Aplikasi Pinjol</option>
            <option>Shopee</option>
            <option>Kredivo</option>
            <option>Akulaku</option>
        </select>
    </div>

    <div class="input-box">
        <img src="img/icon-user.png">
        <input id="nama" placeholder="Nama Lengkap">
    </div>

    <div class="input-box">
        <img src="img/icon-wa.png">
        <input id="hp" placeholder="Nomor WhatsApp">
    </div>

    <div class="input-box">
        <img src="img/icon-rp.png">
        <input id="jumlah" placeholder="Total Pinjaman">
    </div>

    <div class="input-box">
        <img src="img/icon-calendar.png">
        <input id="tenor" placeholder="Jangka Waktu">
    </div>

    <button class="submit" onclick="kirimWA()">Ajukan Sekarang</button>
</div>

<script src="script.js"></script>

</body>
</html>

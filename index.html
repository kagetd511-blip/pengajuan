<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinjamanCare</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<div class="hero">
   <img src="img/heroo.jpg">
</div>

<!-- STATS -->
<div class="stats">
    <img src="img/statss-full.png">
</div>

<!-- PROSES -->
<div class="proses">
    <img src="img/prosess-full.png">
</div>

<!-- FORM -->
<div class="form-box">
    <h3>Form Pengajuan</h3>

   <!-- DROPDOWN KEREN -->
<div class="custom-select">
    <div class="select-box" onclick="toggleSelect()">
        <span id="selectedText">Pilih Aplikasi</span>
        <div class="arrow">⌄</div>
    </div>

    <div class="options">

        <div class="option" onclick="selectOption(this)"><img src="img/spinjam.png"> SPinjam</div>
        <div class="option" onclick="selectOption(this)"><img src="img/easycash.png"> EasyCash</div>
        <div class="option" onclick="selectOption(this)"><img src="img/akulaku.png"> AkuLaku</div>
        <div class="option" onclick="selectOption(this)"><img src="img/rupiahcepat.png"> Rupiah Cepat</div>
        <div class="option" onclick="selectOption(this)"><img src="img/adapundi.png"> AdaPundi</div>
        <div class="option" onclick="selectOption(this)"><img src="img/indosaku.png"> Indosaku</div>
        <div class="option" onclick="selectOption(this)"><img src="img/tunaiku.png"> Tunaiku</div>
        <div class="option" onclick="selectOption(this)"><img src="img/adakami.png"> AdaKami</div>
        <div class="option" onclick="selectOption(this)"><img src="img/uatas.png"> Uatas</div>
        <div class="option" onclick="selectOption(this)"><img src="img/finplus.png"> FinPlus</div>
        <div class="option" onclick="selectOption(this)"><img src="img/bantusaku.png"> BantuSaku</div>
        <div class="option" onclick="selectOption(this)"><img src="img/uangindo.png"> UangIndo</div>
        <div class="option" onclick="selectOption(this)"><img src="img/indodana.png"> IndoDana</div>
        <div class="option" onclick="selectOption(this)"><img src="img/lumbungdana.png"> Lumbung Dana</div>
        <div class="option" onclick="selectOption(this)"><img src="img/danaku.png"> Danaku</div>
        <div class="option" onclick="selectOption(this)"><img src="img/uku.png"> UKU</div>
        <div class="option" onclick="selectOption(this)"><img src="img/cashcepat.png"> Cash Cepat</div>
        <div class="option" onclick="selectOption(this)"><img src="img/pinjamduit.png"> Pinjam Duit</div>
        <div class="option" onclick="selectOption(this)"><img src="img/pinjamyuk.png"> Pinjam Yuk</div>
        <div class="option" onclick="selectOption(this)"><img src="img/danayuk.png"> Dana Yuk</div>
        <div class="option" onclick="selectOption(this)"><img src="img/uangsahabat.png"> Uang Sahabat</div>
        <div class="option" onclick="selectOption(this)"><img src="img/cairin.png"> Cairin</div>
        <div class="option" onclick="selectOption(this)"><img src="img/pinjamamanah.png"> Pinjam Amanah</div>
        <div class="option" onclick="selectOption(this)"><img src="img/danadigital.png"> Dana Digital</div>
        <div class="option" onclick="selectOption(this)"><img src="img/kredione.png"> Kredi One</div>

        <!-- LAINNYA -->
        <div class="option" onclick="selectOption(this)">
            ➕ Lain lain
        </div>

    </div>
</div>

    <div class="input-box">
        <img src="img/icon-userr.png">
        <input id="nama" placeholder="Nama Lengkap">
    </div>

    <div class="input-box">
        <img src="img/icon-waa.png">
        <input id="hp" placeholder="Nomor WhatsApp">
    </div>

    <div class="input-box">
        <img src="img/icon-rpp.png">
        <input id="jumlah" placeholder="Total Pinjaman">
    </div>

    <div class="input-box">
        <img src="img/icon-calendarr.png">
        <input id="tenor" placeholder="Jangka Waktu">
    </div>

    <button class="submit" onclick="kirimWA()">Ajukan Sekarang</button>
</div>

<script src="script.js"></script>
</body>
</html>
